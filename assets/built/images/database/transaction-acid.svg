<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9fafb"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#166534"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b91c1c"/>
    </marker>
  </defs>

  <rect width="1600" height="800" fill="url(#bg)"/>

  <!-- Title -->
  <text x="800" y="100"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="56" font-weight="700" text-anchor="middle" fill="#111827">
    All or Nothing
  </text>
  <text x="800" y="148"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="400" text-anchor="middle" fill="#6b7280">
    Transaction &amp; ACID — MySQL InnoDB vs PostgreSQL
  </text>

  <!-- ── Initial state (left) ── -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="180" y="260" font-size="18" font-weight="600" fill="#6b7280" text-anchor="middle">초기 상태</text>
    <rect x="80" y="290" width="200" height="160" rx="14"
          fill="#ffffff" stroke="#374151" stroke-width="2"/>
    <text x="180" y="338" font-size="26" font-weight="700" fill="#111827" text-anchor="middle">A: 1000</text>
    <text x="180" y="380" font-size="26" font-weight="700" fill="#111827" text-anchor="middle">B: 1000</text>
    <text x="180" y="420" font-size="14" fill="#9ca3af" text-anchor="middle">합계 2000</text>
  </g>

  <!-- arrow Initial → Transaction box -->
  <line x1="290" y1="370" x2="450" y2="370"
        stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="370" y="355" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" font-weight="700" fill="#374151" text-anchor="middle">BEGIN</text>

  <!-- ── Transaction box (center) ── -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <rect x="460" y="240" width="440" height="260" rx="16"
          fill="#ffffff" stroke="#1e40af" stroke-width="3" stroke-dasharray="8,4"/>
    <text x="680" y="222" font-size="18" font-weight="600" fill="#1e40af" text-anchor="middle">트랜잭션 (atomic 단위)</text>

    <!-- Query 1 -->
    <rect x="490" y="276" width="380" height="80" rx="10"
          fill="#eff6ff" stroke="#1e40af" stroke-width="1.5"/>
    <text x="510" y="306" font-size="16" font-weight="700" fill="#1e40af">송금 query</text>
    <text x="510" y="338" font-size="15" fill="#1e3a8a" font-family="'SF Mono','Menlo','Consolas',monospace">
      UPDATE accounts SET balance -= 100 WHERE id='A';
    </text>

    <!-- Query 2 -->
    <rect x="490" y="380" width="380" height="80" rx="10"
          fill="#eff6ff" stroke="#1e40af" stroke-width="1.5"/>
    <text x="510" y="410" font-size="16" font-weight="700" fill="#1e40af">수금 query</text>
    <text x="510" y="442" font-size="15" fill="#1e3a8a" font-family="'SF Mono','Menlo','Consolas',monospace">
      UPDATE accounts SET balance += 100 WHERE id='B';
    </text>
  </g>

  <!-- Branch lines -->
  <!-- Commit branch (top, green) -->
  <path d="M 900 320 Q 1050 320, 1150 220"
        stroke="#166534" stroke-width="4" fill="none" marker-end="url(#arrow-green)"/>
  <text x="1010" y="265" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="700" fill="#166534" text-anchor="middle">COMMIT</text>

  <!-- Rollback/crash branch (bottom, red) -->
  <path d="M 900 420 Q 1050 420, 1150 540"
        stroke="#b91c1c" stroke-width="4" fill="none" stroke-dasharray="10,5"
        marker-end="url(#arrow-red)"/>
  <text x="1010" y="495" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="700" fill="#b91c1c" text-anchor="middle">ROLLBACK / 💥</text>

  <!-- ── COMMIT outcome (top right) ── -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <rect x="1180" y="155" width="280" height="140" rx="14"
          fill="#dcfce7" stroke="#166534" stroke-width="2.5"/>
    <text x="1320" y="190" font-size="16" font-weight="700" fill="#166534" text-anchor="middle">최종 — 두 query 모두 반영</text>
    <text x="1320" y="232" font-size="26" font-weight="700" fill="#14532d" text-anchor="middle">A: 900</text>
    <text x="1320" y="266" font-size="26" font-weight="700" fill="#14532d" text-anchor="middle">B: 1100</text>
  </g>

  <!-- ── ROLLBACK outcome (bottom right) ── -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <rect x="1180" y="475" width="280" height="140" rx="14"
          fill="#fee2e2" stroke="#b91c1c" stroke-width="2.5"/>
    <text x="1320" y="510" font-size="16" font-weight="700" fill="#b91c1c" text-anchor="middle">최종 — 두 query 모두 되돌림</text>
    <text x="1320" y="552" font-size="26" font-weight="700" fill="#7f1d1d" text-anchor="middle">A: 1000</text>
    <text x="1320" y="586" font-size="26" font-weight="700" fill="#7f1d1d" text-anchor="middle">B: 1000</text>
  </g>

  <!-- Forbidden middle state (centered bottom) -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <rect x="540" y="600" width="520" height="120" rx="14"
          fill="#ffffff" stroke="#9ca3af" stroke-width="2" stroke-dasharray="6,6"/>
    <text x="800" y="635" font-size="17" font-weight="700" fill="#6b7280" text-anchor="middle">
      ✗ 절대 보이면 안 되는 절반 상태
    </text>
    <text x="800" y="675" font-size="22" font-weight="700" fill="#9ca3af" text-anchor="middle">
      A: 900   B: 1000   (합계 1900 — 100원 증발)
    </text>
    <text x="800" y="702" font-size="13" fill="#9ca3af" text-anchor="middle" font-style="italic">
      Atomicity 가 막아주는 시나리오
    </text>
  </g>

  <!-- Footer caption: ACID anchors -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
     font-size="14" fill="#6b7280">
    <text x="80" y="770">A·C·I·D · BEGIN ┄ COMMIT/ROLLBACK</text>
    <text x="1520" y="770" text-anchor="end">InnoDB: Redo + Undo  ·  PostgreSQL: WAL + Heap MVCC</text>
  </g>
</svg>
